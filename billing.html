<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Summary</title>
    <link rel="stylesheet" href="kan2.css">
    <!-- ✅ Removed script.js import — it was running calculateBill() here and resetting subtotal/tax to 0 -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        .total {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Billing Summary</h1>
        <table id="bill-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="bill-items">
                <!-- Items will be populated here -->
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3">Subtotal:</td>
                    <td id="subtotal"></td>
                </tr>
                <tr>
                    <td colspan="3">Tax (0.3%):</td>
                    <td id="tax"></td>
                </tr>
                <tr>
                    <td colspan="3">Total:</td>
                    <td id="total-amount"></td>
                </tr>
            </tfoot>
        </table>
        <button onclick="window.location.href='index.html'">Back to Billing</button>
        <button onclick="printBill()">Print Bill</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const billData = JSON.parse(localStorage.getItem('billData'));

            if (billData && billData.items) {
                const tbody = document.getElementById('bill-items');

                billData.items.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>Rs. ${item.price.toFixed(2)}</td>
                        <td>Rs. ${item.total.toFixed(2)}</td>
                    `;
                    tbody.appendChild(row);
                });

                // ✅ These now correctly read the values saved by the fixed script.js
                document.getElementById('subtotal').textContent = `Rs. ${Number(billData.subtotal).toFixed(2)}`;
                document.getElementById('tax').textContent = `Rs. ${Number(billData.tax).toFixed(2)}`;
                document.getElementById('total-amount').textContent = `Rs. ${Number(billData.total).toFixed(2)}`;
            } else {
                document.getElementById('bill-items').innerHTML = '<tr><td colspan="4">No items in bill</td></tr>';
                document.getElementById('subtotal').textContent = 'Rs. 0.00';
                document.getElementById('tax').textContent = 'Rs. 0.00';
                document.getElementById('total-amount').textContent = 'Rs. 0.00';
            }
        });

        function printBill() {
            window.print();
        }
    </script>
</body>
</html>
