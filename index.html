<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants Billing</title>
    <link rel="stylesheet" href="kan2.css">
    <style>
		body {
			font-family: Arial, sans-serif;
		}
		
		.container {
			width: 80%;
			margin: 40px auto;
			padding: 20px;
			border: 1px solid #ddd;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
		}
        .bill-container {
			margin-top: 40px;
		}
		
		table {
			width: 100%;
			border-collapse: collapse;
		}
		
		th, td {
			border: 1px solid #ddd;
			padding: 10px;
			text-align: left;
		}
		
		th {
			background-color: #f0f0f0;
		}
        .button {
			background-color: #4CAF50;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
		
		.button:hover {
			background-color: #3e8e41;
		}
	</style>
</head>
<body>
    <div class="container">
		<center><h1>Zephy Grill</h1></center>
		
		<div class="bill-container">
			<h2>Restaurants Billing System</h2>
			<form onsubmit="return false;">
				<table>
					<thead>
						<tr>
							<th>Item</th>
							<th>Quantity</th>
							<th>Price</th>
							<th>Total</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td class="non-veg"><input type="text" id="item1" name="item1" value="🍗 Hoskote chicken Biryani"></td>
							<td><input type="number" id="quantity1" name="quantity1" value="0" min="0"></td>
							<td><input type="number" id="price1" name="price1" value="350.00" readonly></td>
							<td id="total1">0.00</td>
						</tr>
						<tr>
							<td class="non-veg"><input type="text" id="item2" name="item2" value="🍗 Chicken Sukka"></td>
							<td><input type="number" id="quantity2" name="quantity2" value="0" min="0"></td>
							<td><input type="number" id="price2" name="price2" value="180.00" readonly></td>
							<td id="total2">0.00</td>
						</tr>
						<tr>
							<td class="veg"><input type="text" id="item3" name="item3" value="🥕 Masala Dosa"></td>
							<td><input type="number" id="quantity3" name="quantity3" value="0" min="0"></td>
							<td><input type="number" id="price3" name="price3" value="80.00" readonly></td>
							<td id="total3">0.00</td>
						</tr>
						<tr>
							<td class="veg"><input type="text" id="item4" name="item4" value="🥕 Idli Vada"></td>
							<td><input type="number" id="quantity4" name="quantity4" value="0" min="0"></td>
							<td><input type="number" id="price4" name="price4" value="60.00" readonly></td>
							<td id="total4">0.00</td>
						</tr>
						<tr>
							<td class="veg"><input type="text" id="item5" name="item5" value="🥕 Filter Coffee"></td>
							<td><input type="number" id="quantity5" name="quantity5" value="0" min="0"></td>
							<td><input type="number" id="price5" name="price5" value="25.00" readonly></td>
							<td id="total5">0.00</td>
						</tr>
					</tbody>
				</table>
				<br>
				<table>
					<tr>
						<td colspan="3">Subtotal:</td>
						<td id="subtotal">0.00</td>
					</tr>
					<tr>
						<td colspan="3">Tax (0.3%):</td>
						<td id="tax">0.00</td>
					</tr>
					<tr>
						<td colspan="3">Total:</td>
						<td id="total">0.00</td>
					</tr>
					<tr style="font-weight: bold;">
						<td colspan="3">Total (in Rupees):</td>
						<td id="total-rupees"></td>
					</tr>
				</table>
				<br>
				<center><button class="button" onclick="generateBill()">Generate Bill</button></center>
    </form>
</div>
</div>


<script src="./script.js" >

	</script>
</body>
</html>
